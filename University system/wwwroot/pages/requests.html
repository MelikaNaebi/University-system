<div class="container mt-4">
    <h4 class="mb-4"><i class="bi bi-envelope-paper-fill"></i> ثبت درخواست جدید</h4>

    <div class="card bg-dark text-white p-4 mb-5 border-secondary">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">نوع درخواست</label>
                <select id="ddlTemplates" class="form-select bg-dark text-white border-secondary">
                    <option value="">انتخاب کنید...</option>
                </select>
            </div>
            <div class="col-md-8">
                <label class="form-label">عنوان</label>
                <input type="text" id="txtTitle" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="col-12">
                <label class="form-label">توضیحات</label>
                <textarea id="txtDescription" class="form-control bg-dark text-white border-secondary" rows="3"></textarea>
            </div>
            <div class="col-12">
                <button id="btnSubmitRequest" class="btn btn-primary px-4">ثبت درخواست</button>
            </div>
        </div>
    </div>

    <h4 class="mb-3">لیست درخواست‌های من</h4>
    <div class="table-responsive">
        <table class="table table-dark table-hover align-middle">
            <thead>
                <tr>
                    <th>#</th>
                    <th>عنوان</th>
                    <th>قالب</th>
                    <th>وضعیت</th>
                    <th>تاریخ</th>
                </tr>
            </thead>
            <tbody id="requestsTableBody">
            </tbody>
        </table>
    </div>
</div>
