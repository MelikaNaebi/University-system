<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سامانه دانشگاهی</title>
    <!-- بوت‌استرپ راست‌چین -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <!-- آیکون‌های FontAwesome برای جذابیت فیلدها -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            background: var(--primary-gradient);
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-x: hidden;
        }

        /* کانتینر اصلی با انیمیشن ورود نرم */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 15px;
            animation: fadeIn 0.6s ease-out;
        }

        .login-card {
            background: var(--card-bg);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .brand-header {
            text-align: center;
            padding: 20px 0 10px 0;
        }

        .brand-icon {
            font-size: 3rem;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .brand-header h3 {
            font-weight: 700;
            color: #203a43;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
        }

        /* استایل مدرن فیلدهای ورودی */
        .input-group-custom {
            position: relative;
            margin-bottom: 22px;
        }

            .input-group-custom i {
                position: absolute;
                right: 15px;
                top: 50%;
                transform: translateY(-50%);
                color: #8898aa;
                transition: color 0.3s ease;
                z-index: 10;
            }

            .input-group-custom .form-control {
                padding: 12px 45px 12px 15px;
                border-radius: 12px;
                border: 1.5px solid #dee2e6;
                background-color: #fcfcfc;
                font-size: 0.95rem;
                transition: all 0.3s ease;
            }

                .input-group-custom .form-control:focus {
                    border-color: #203a43;
                    box-shadow: 0 0 0 4px rgba(32, 58, 67, 0.15);
                    background-color: #fff;
                }

                    .input-group-custom .form-control:focus + i {
                        color: #203a43;
                    }

        .form-label-custom {
            font-size: 0.88rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            display: block;
        }

        /* دکمه ورود با افکت هاور خیره‌کننده */
        .btn-login {
            background: linear-gradient(135deg, #203a43, #2c5364);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(32, 58, 67, 0.3);
        }

            .btn-login:hover {
                background: linear-gradient(135deg, #2c5364, #203a43);
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(32, 58, 67, 0.4);
                color: #fff;
            }

            .btn-login:active {
                transform: translateY(1px);
            }

        /* انیمیشن لودینگ برای دکمه در زمان ارسال درخواست */
        .spinner-border-custom {
            width: 1.2rem;
            height: 1.2rem;
            display: none;
            vertical-align: middle;
        }

        .alert-custom {
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="card login-card p-4">

            <div class="brand-header">
                <div class="brand-icon">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h3>سامانه مدیریت دانشگاه</h3>
                <p class="text-muted small mt-1">به پنل جامع آموزشی خوش آمدید</p>
            </div>

            <form id="loginForm" class="mt-2">
                <div class="mb-1">
                    <label for="username" class="form-label-custom">   نام کاربری</label>
                    <div class="input-group-custom">
                        <input type="text" class="form-control" id="username" placeholder="نام کاربری خود را وارد کنید" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="mb-2">
                    <label for="password" class="form-label-custom">رمز عبور</label>
                    <div class="input-group-custom">
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <button type="submit" id="btnLogin" class="btn btn-login w-100 mt-2">
                    <span id="btnText">ورود به سیستم</span>
                    <div class="spinner-border spinner-border-custom text-light ms-2" id="btnSpinner" role="status"></div>
                </button>
            </form>

            <div id="errorMessage" class="alert alert-danger alert-custom mt-4 d-none" role="alert">
                <i class="fa-solid fa-circle-exclamation me-2"></i>
                <span id="errorText"></span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const btnLogin = document.getElementById('btnLogin');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            // پنهان کردن خطای قبلی و فعال کردن انیمیشن دکمه
            errorDiv.classList.add('d-none');
            btnLogin.disabled = true;
            btnText.textContent = 'در حال بررسی...';
            btnSpinner.style.display = 'inline-block';

            try {
                const response = await fetch('https://localhost:7246/api/Auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                const data = await response.json();

                if (response.ok && data.isSuccess) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);

                    // هدایت کاربر به صفحه داشبورد بر اساس نقش کاربر (بند ۳ خواسته استاد)
                    if (data.role === 'Student') {
                        window.location.href = 'studentdashboard.html';
                    }
                    else if (data.role === 'Instructor') {
                        window.location.href = 'instructordashboard.html';
                    }
                    else if (data.role === 'Admin') {
                        window.location.href = 'admindashboard.html';
                    }
                       
                } else {
                    errorText.textContent = data.message || 'نام کاربری یا رمز عبور اشتباه است.';
                    errorDiv.classList.remove('d-none');
                }
            } catch (error) {
                errorText.textContent = 'ارتباط با سرور برقرار نشد. لطفاً وضعیت API را بررسی کنید.';
                errorDiv.classList.remove('d-none');
            } finally {
                // بازگرداندن وضعیت دکمه به حالت عادی
                btnLogin.disabled = false;
                btnText.textContent = 'ورود به سیستم';
                btnSpinner.style.display = 'none';
            }
        });
    </script>

</body>
</html>
